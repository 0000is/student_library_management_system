<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Account</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="page-wrapper">
    <div class="card form-card">
        <h2>Create Account</h2>
        <p class="subtitle">Register to access the e-Library</p>

        {% if error %}
            <div class="error-box">{{ error }}</div>
        {% endif %}

        <form method="POST">

            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter username" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter password" required>
                <small class="info-text">password must at least be 8 characters including uppercase, number or special character</small>
            </div>

            <div class="form-group">
                <label>Role</label>
                <select name="role" required>
                    <option value="">Select role</option>
                    <option value="student">Student</option>
                    <option value="teacher">Teacher</option>
                </select>
            </div>

            <button type="submit" class="btn primary full">Register</button>
        </form>

        <p class="info-text">
            Admin approval is required after registration.
        </p>

        <a href="{{ url_for('login') }}" class="link back">
            ← Back to Login
        </a>
    </div>
</div>

</body>
</html>
