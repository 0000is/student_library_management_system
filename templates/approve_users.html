<!DOCTYPE html>
<html>
<head>
    <title>Approve Users</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<h2>Pending Users Approval</h2>

<table>
    <tr>
        <th>Username</th>
        <th>Role</th>
        <th>Action</th>
    </tr>

    {% for user in users %}
    <tr>
        <td>{{ user.username }}</td>
        <td>{{ user.role }}</td>
        <td>
            <a class="btn" href="/admin/approve/{{ user.id }}">Approve</a>
        </td>
    </tr>
    {% endfor %}
</table>

<br>
<a href="/admin">Back to Dashboard</a>

</body>
</html>
