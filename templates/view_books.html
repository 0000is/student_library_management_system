<!DOCTYPE html>
<html>
<head>
    <title>Library Books</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<h2>Available Books</h2>

<ul>
    {% for book in books %}

            {{ book }}

    {% endfor %}
</ul>

<br>
<a href="/login">Logout</a>

</body>
</html>
