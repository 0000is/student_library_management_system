<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Book</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="page-wrapper">
    <div class="card form-card">
        <h2>Add New Book</h2>
        <p class="subtitle">Upload a book and assign a category</p>

        <form method="POST" enctype="multipart/form-data">

            <div class="form-group">
                <label>Book Title</label>
                <input type="text" name="title" placeholder="Enter book title" required>
            </div>

            <div class="form-group">
                <label>Author</label>
                <input type="text" name="author" placeholder="Enter author name" required>
            </div>

            <div class="form-group">
                <label>Category</label>
                <select name="category" required>
                    <option value="">Select category</option>
                    <option value="Science">Science</option>
                    <option value="Technology">Technology</option>
                    <option value="Education">Education</option>
                    <option value="Arts">Arts</option>
                </select>
            </div>

            <div class="form-group">
                <label>Book File (PDF)</label>
                <input type="file" name="file" required>
            </div>

            <button type="submit" class="btn primary full">Add Book</button>
        </form>

        <a href="{{ url_for('admin_dashboard') }}" class="link back">← Back to Dashboard</a>
    </div>
</div>

</body>
</html>
